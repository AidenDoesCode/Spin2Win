<svg xmlns="http://www.w3.org/2000/svg" width="320" height="180" viewBox="0 0 32 18">
  <!-- Fish-theme tower defense map: 32x18 tile grid. 1 SVG unit = 1 Unity world unit = 1 tile (matches Unity exactly). -->
  <defs>
    <style>
      .grid { stroke: #1c5d7a; stroke-width: 0.0625; opacity: 0.35; }
      .pathTile { stroke: #e3c16f; stroke-width: 1; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .pathEdge { stroke: #b8924f; stroke-width: 1.25; stroke-linecap: round; stroke-linejoin: round; fill: none; opacity: 0.5; }
      .connector { stroke-width: 0.25; stroke-linecap: round; fill: none; }
      .gateLabel { font-family: monospace; font-size: 0.75px; font-weight: bold; fill: #ffffff; text-anchor: middle; }
      .baseLabel { font-family: monospace; font-size: 0.625px; font-weight: bold; fill: #ffffff; text-anchor: middle; }
      .title { font-family: monospace; font-size: 0.875px; fill: #d7f4f2; }
    </style>
  </defs>

  <!-- Ocean floor background (buildable area) -->
  <rect x="0" y="0" width="32" height="18" fill="#0a3d62"/>
  <rect x="0" y="0" width="32" height="18" fill="#0e4a73" opacity="0.4"/>
  <g class="grid">
    <line x1="1" y1="0" x2="1" y2="18"/>
    <line x1="2" y1="0" x2="2" y2="18"/>
    <line x1="3" y1="0" x2="3" y2="18"/>
    <line x1="4" y1="0" x2="4" y2="18"/>
    <line x1="5" y1="0" x2="5" y2="18"/>
    <line x1="6" y1="0" x2="6" y2="18"/>
    <line x1="7" y1="0" x2="7" y2="18"/>
    <line x1="8" y1="0" x2="8" y2="18"/>
    <line x1="9" y1="0" x2="9" y2="18"/>
    <line x1="10" y1="0" x2="10" y2="18"/>
    <line x1="11" y1="0" x2="11" y2="18"/>
    <line x1="12" y1="0" x2="12" y2="18"/>
    <line x1="13" y1="0" x2="13" y2="18"/>
    <line x1="14" y1="0" x2="14" y2="18"/>
    <line x1="15" y1="0" x2="15" y2="18"/>
    <line x1="16" y1="0" x2="16" y2="18"/>
    <line x1="17" y1="0" x2="17" y2="18"/>
    <line x1="18" y1="0" x2="18" y2="18"/>
    <line x1="19" y1="0" x2="19" y2="18"/>
    <line x1="20" y1="0" x2="20" y2="18"/>
    <line x1="21" y1="0" x2="21" y2="18"/>
    <line x1="22" y1="0" x2="22" y2="18"/>
    <line x1="23" y1="0" x2="23" y2="18"/>
    <line x1="24" y1="0" x2="24" y2="18"/>
    <line x1="25" y1="0" x2="25" y2="18"/>
    <line x1="26" y1="0" x2="26" y2="18"/>
    <line x1="27" y1="0" x2="27" y2="18"/>
    <line x1="28" y1="0" x2="28" y2="18"/>
    <line x1="29" y1="0" x2="29" y2="18"/>
    <line x1="30" y1="0" x2="30" y2="18"/>
    <line x1="31" y1="0" x2="31" y2="18"/>
    <line x1="0" y1="1" x2="32" y2="1"/>
    <line x1="0" y1="2" x2="32" y2="2"/>
    <line x1="0" y1="3" x2="32" y2="3"/>
    <line x1="0" y1="4" x2="32" y2="4"/>
    <line x1="0" y1="5" x2="32" y2="5"/>
    <line x1="0" y1="6" x2="32" y2="6"/>
    <line x1="0" y1="7" x2="32" y2="7"/>
    <line x1="0" y1="8" x2="32" y2="8"/>
    <line x1="0" y1="9" x2="32" y2="9"/>
    <line x1="0" y1="10" x2="32" y2="10"/>
    <line x1="0" y1="11" x2="32" y2="11"/>
    <line x1="0" y1="12" x2="32" y2="12"/>
    <line x1="0" y1="13" x2="32" y2="13"/>
    <line x1="0" y1="14" x2="32" y2="14"/>
    <line x1="0" y1="15" x2="32" y2="15"/>
    <line x1="0" y1="16" x2="32" y2="16"/>
    <line x1="0" y1="17" x2="32" y2="17"/>
  </g>

  <!-- Path: edge underlay (drawn first, wider, darker, for a tile-border look) -->
  <g>
    <polyline class="pathEdge" points="5.5,4.5 5.5,9.5 13.5,9.5"/>
    <polyline class="pathEdge" points="5.5,14.5 10.5,14.5 10.5,9.5 10.5,6.5 13.5,6.5 13.5,9.5"/>
    <polyline class="pathEdge" points="24.5,0.5 24.5,4.5 20.5,4.5 20.5,9.5 13.5,9.5"/>
    <polyline class="pathEdge" points="13.5,9.5 16.5,9.5"/>
  </g>

  <!-- Path: Gate A route (winds down then right into the crossroads/merge) -->
  <polyline class="pathTile" points="5.5,4.5 5.5,9.5 13.5,9.5" fill="none"/>

  <!-- Path: Gate B route (winds up through the crossroads at 10.5,9.5, kinks right, drops into merge) -->
  <polyline class="pathTile" points="5.5,14.5 10.5,14.5 10.5,9.5 10.5,6.5 13.5,6.5 13.5,9.5" fill="none"/>

  <!-- Path: Gate C route (winds down the right side, left, down, into merge) -->
  <polyline class="pathTile" points="24.5,0.5 24.5,4.5 20.5,4.5 20.5,9.5 13.5,9.5" fill="none"/>

  <!-- Main Highway: shared final stretch into the base -->
  <polyline points="13.5,9.5 16.5,9.5" stroke="#ffd97d" stroke-width="1.125" stroke-linecap="round" fill="none"/>

  <!-- Crossroads marker (A x B intersection) -->
  <circle cx="10.5" cy="9.5" r="0.625" fill="none" stroke="#ffffff" stroke-width="0.1" opacity="0.6"/>

  <!-- 3-way merge marker (where A, B, C routes converge onto the Main Highway) -->
  <circle cx="13.5" cy="9.5" r="0.6875" fill="none" stroke="#ffffff" stroke-width="0.1" opacity="0.6"/>

  <!-- Gate connectors: exact world-coordinate marker to nearest path lane -->
  <line class="connector" x1="4.7" y1="4.5" x2="5.5" y2="4.5" stroke="#E04D4D"/>
  <line class="connector" x1="4.8" y1="14" x2="5.5" y2="14.5" stroke="#4D99E0"/>
  <line class="connector" x1="24.4" y1="0" x2="24.5" y2="0.5" stroke="#66CC66"/>

  <!-- Gate markers (exact world coords: A(-11.3,4.5) B(-11.2,-5) C(8.4,9)) -->
  <circle cx="4.7" cy="4.5" r="0.5625" fill="#E04D4D" stroke="#ffffff" stroke-width="0.125"/>
  <text class="gateLabel" x="4.7" y="3.625">A</text>

  <circle cx="4.8" cy="14" r="0.5625" fill="#4D99E0" stroke="#ffffff" stroke-width="0.125"/>
  <text class="gateLabel" x="4.8" y="15.375">B</text>

  <circle cx="24.4" cy="0" r="0.5625" fill="#66CC66" stroke="#ffffff" stroke-width="0.125"/>
  <text class="gateLabel" x="24.4" y="2">C</text>

  <!-- Base at world (0,0) -> tile (16,9) -->
  <rect x="15.75" y="8.75" width="1.5" height="1.5" fill="#ff8c69" stroke="#ffffff" stroke-width="0.125"/>
  <text class="baseLabel" x="16.5" y="10.75">BASE</text>

  <text class="title" x="0.5" y="1.125">Spin2Win Map (32x18, 1 unit = 1 tile)</text>
</svg>
